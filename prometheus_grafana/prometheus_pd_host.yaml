global:
  scrape_interval: 5s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'vllm-fast-prefill'
    static_configs:
      - targets: ['localhost:20098']
        labels:
          instance: 'fast-prefill'
          role: 'prefill'
          lane: 'fast'

  - job_name: 'vllm-fast-decode'
    static_configs:
      - targets: ['localhost:20099']
        labels:
          instance: 'fast-decode'
          role: 'decode'
          lane: 'fast'

  - job_name: 'vllm-slow-prefill'
    static_configs:
      - targets: ['localhost:20096']
        labels:
          instance: 'slow-prefill'
          role: 'prefill'
          lane: 'slow'

  - job_name: 'vllm-slow-decode'
    static_configs:
      - targets: ['localhost:20097']
        labels:
          instance: 'slow-decode'
          role: 'decode'
          lane: 'slow'

  # Proxy metrics endpoint — uncomment once disagg_proxy_migration.py exposes
  # /metrics via prometheus_client (planned: migration_rate counter,
  # migration_pause_seconds histogram on a dedicated port :19099).
  #
  # - job_name: 'vllm-proxy'
  #   static_configs:
  #     - targets: ['localhost:19099']
  #       labels:
  #         instance: 'proxy'
  #         role: 'proxy'
